<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特訓LINE送信ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --text: #e8eaf6;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .header p {
    color: var(--text-muted);
    font-size: 13px;
  }

  .gas-config {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  .gas-config label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .gas-config input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .gas-config input:focus {
    border-color: var(--accent);
  }

  .upload-area {
    max-width: 700px;
    margin: 0 auto 24px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }

  .upload-area:hover, .upload-area.dragover {
    border-color: var(--accent);
    background: rgba(79, 142, 247, 0.05);
  }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .upload-area h2 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .upload-area p {
    font-size: 13px;
    color: var(--text-muted);
  }

  #fileInput { display: none; }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--danger);
    border-radius: 10px;
    padding: 14px 18px;
    margin: 0 auto 20px;
    max-width: 700px;
    font-size: 14px;
  }

  .results {
    display: none;
    max-width: 700px;
    margin: 0 auto;
  }

  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .summary-bar .total {
    font-size: 14px;
    color: var(--text-dim);
  }

  .summary-bar .total span {
    color: var(--accent);
    font-weight: 700;
  }

  .stats {
    display: flex;
    gap: 16px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .stat-dot.sent { background: var(--success); }
  .stat-dot.manual { background: var(--warning); }
  .stat-dot.pending { background: var(--text-muted); }
  .stat-dot.failed { background: var(--danger); }

  .send-all-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-all-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .send-all-btn:active { transform: translateY(0); }
  .send-all-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    padding: 32px 16px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 660px;
    width: 90%;
    overflow: hidden;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h2 {
    font-size: 17px;
    font-weight: 600;
  }

  .modal-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    line-height: 1;
  }

  .modal-close:hover { color: var(--text); background: var(--surface2); }

  .modal-body {
    padding: 16px 24px;
    max-height: 55vh;
    overflow-y: auto;
  }

  .preview-row {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .preview-row-header {
    padding: 10px 14px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
  }

  .preview-row-body {
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
    white-space: pre-wrap;
    border-top: 1px solid var(--border);
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .modal-footer .count-note {
    font-size: 13px;
    color: var(--text-muted);
  }

  .modal-footer .count-note span {
    color: var(--accent);
    font-weight: 700;
  }

  .btn-confirm {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-confirm:hover { opacity: 0.85; }

  .btn-cancel {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .student-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .student-card.status-sent { border-color: rgba(52, 211, 153, 0.4); }
  .student-card.status-failed { border-color: rgba(248, 113, 113, 0.4); }
  .student-card.status-manual { border-color: rgba(251, 191, 36, 0.4); }

  .card-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .student-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 24px;
  }

  .student-name {
    font-size: 15px;
    font-weight: 500;
  }

  .id-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .no-id-badge {
    font-size: 10px;
    color: var(--warning);
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .status-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .status-badge.pending { background: var(--surface2); color: var(--text-muted); }
  .status-badge.sending { background: rgba(79, 142, 247, 0.15); color: var(--accent); }
  .status-badge.sent { background: rgba(52, 211, 153, 0.15); color: var(--success); }
  .status-badge.failed { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
  .status-badge.manual-done { background: rgba(251, 191, 36, 0.15); color: var(--warning); }

  /* エラー詳細バー */
  .error-detail-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px 10px;
    background: rgba(248, 113, 113, 0.07);
    border-top: 1px solid rgba(248, 113, 113, 0.2);
    font-size: 12px;
    color: var(--danger);
  }

  .error-detail-bar .error-icon {
    font-size: 13px;
    flex-shrink: 0;
  }

  .error-detail-bar .error-text {
    flex: 1;
    line-height: 1.5;
  }

  .btn {
    border: none;
    border-radius: 7px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .btn-send {
    background: rgba(79, 142, 247, 0.15);
    color: var(--accent);
    border: 1px solid rgba(79, 142, 247, 0.3);
  }

  .btn-send:hover { background: rgba(79, 142, 247, 0.25); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-copy {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-copy:hover { border-color: var(--text-muted); }

  .manual-check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
  }

  .manual-check input[type="checkbox"] {
    accent-color: var(--warning);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .template-preview {
    border-top: 1px solid var(--border);
    padding: 14px 18px;
    background: var(--surface2);
  }

  .template-textarea {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    resize: vertical;
    outline: none;
    padding: 6px 8px;
    min-height: 120px;
    transition: border-color 0.2s, background 0.2s;
  }

  .template-textarea:hover { border-color: var(--border); }
  .template-textarea:focus {
    border-color: var(--accent);
    background: rgba(79, 142, 247, 0.05);
    color: var(--text);
  }

  .edit-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .toggle-preview {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .toggle-preview:hover { color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <h1>📱 特訓LINE送信ツール</h1>
  <p>Excelをアップロードして生徒に自動でLINEを送信します</p>
</div>

<div class="gas-config">
  <label>🔑 Google Apps Script URL</label>
  <input type="text" id="gasUrl" value="https://script.google.com/macros/s/AKfycbwqQVwj6ZI5A3pv4OCb3NaOMhG2vGfJWvBZ9UIAiyn4_Aig-FUWFDWuaouU1LeeFxyo/exec" />
  <div id="pasteStatus" style="font-size:12px;color:var(--success);margin-top:8px;"></div>
</div>

<div class="upload-area" id="uploadArea">
  <div class="upload-icon">📂</div>
  <h2>Excelファイルをドロップ</h2>
  <p>またはクリックしてファイルを選択（.xlsx / .xls）</p>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>データを読み込み中...</p>
</div>

<div class="error-msg" id="errorMsg"></div>

<!-- 確認モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>📋 送信内容の確認</h2>
        <p>以下の内容でLINEを送信します。問題なければ「送信する」を押してください。</p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <div>
        <div class="count-note"><span id="modalCount">0</span>名に送信します</div>
        <div id="noIdCount" style="font-size:12px;color:var(--warning);margin-top:4px;"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-confirm" onclick="confirmSendAll()">⚡ 送信する</button>
      </div>
    </div>
  </div>
</div>

<div class="results" id="results">
  <div class="summary-bar">
    <div>
      <div class="total"><span id="totalCount">0</span>名の生徒を読み込みました</div>
      <div class="stats" style="margin-top:6px;">
        <div class="stat"><div class="stat-dot sent"></div><span id="sentCount">0</span> 送信済み</div>
        <div class="stat"><div class="stat-dot manual"></div><span id="manualCount">0</span> 手動済み</div>
        <div class="stat"><div class="stat-dot failed"></div><span id="failedCount">0</span> 失敗</div>
        <div class="stat"><div class="stat-dot pending"></div><span id="pendingCount">0</span> 未送信</div>
      </div>
    </div>
    <button class="send-all-btn" id="sendAllBtn" onclick="sendAll()">⚡ 一括送信</button>
  </div>
  <div id="studentList"></div>
</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('errorMsg');
const results = document.getElementById('results');
const studentList = document.getElementById('studentList');

let students = [];
let statusMap = {};
let lineIdCache = {};

// LINE APIエラーコード→日本語マッピング
const LINE_ERROR_MAP = {
  400: 'UID不正または存在しないユーザー（LINE管理シートのUIDを確認してください）',
  401: '認証エラー（アクセストークンを確認してください）',
  403: 'アクセス拒否（Botがブロックされているか権限不足）',
  404: 'ユーザーが見つかりません（UIDが間違っている可能性があります）',
  429: '送信レート超過（しばらく待ってから再試行してください）',
  500: 'LINE APIサーバーエラー（しばらく待ってから再試行してください）',
};

const LINE_MSG_MAP = {
  'The user has not agreed to the LINE Developers Agreement': 'ユーザーがLINE連携に未同意',
  'Invalid reply token': 'リプライトークンが無効',
  'The userId, groupId, or roomId was invalid': 'UID形式が不正（Uから始まる正しいUIDか確認）',
  'The target user has blocked the bot': 'ユーザーにBotがブロックされています',
  'Not found': 'ユーザーが見つかりません（UIDが違う可能性があります）',
};

function friendlyError(code, message) {
  if (message && LINE_MSG_MAP[message]) return LINE_MSG_MAP[message];
  if (code && LINE_ERROR_MAP[code]) return LINE_ERROR_MAP[code];
  if (message) return message;
  return '送信失敗（原因不明）';
}

function normalizeName(str) {
  return str.toString().trim().replace(/[\s\u3000]+/g, '').normalize('NFKC');
}

function loadLineIds(gasUrl) {
  return new Promise((resolve) => {
    const cbName = 'gasCallback_' + Date.now();
    window[cbName] = function(data) {
      lineIdCache = {};
      if (data.students) {
        data.students.forEach(({ name, id }) => {
          lineIdCache[normalizeName(name)] = id;
        });
      }
      const count = Object.keys(lineIdCache).length;
      document.getElementById('pasteStatus').textContent = count > 0
        ? `✅ ${count}件のLINE IDを読み込みました`
        : '⚠️ LINE IDが取得できませんでした';
      if (students.length > 0) { applyLineIds(); renderStudents(); }
      const script = document.querySelector(`script[src*="${cbName}"]`);
      if (script && document.head.contains(script)) document.head.removeChild(script);
      delete window[cbName];
      resolve();
    };
    const script = document.createElement('script');
    script.src = gasUrl + '?callback=' + cbName;
    script.onerror = () => {
      document.getElementById('pasteStatus').textContent = '⚠️ LINE ID取得失敗';
      resolve();
    };
    document.head.appendChild(script);
  });
}

function applyLineIds() {
  students.forEach(s => {
    const key = normalizeName(s['生徒氏名']);
    s['lineUserId'] = lineIdCache[key] || '';
  });
}

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

window.addEventListener('DOMContentLoaded', () => {
  const url = document.getElementById('gasUrl').value.trim();
  if (url) loadLineIds(url);
});

document.getElementById('gasUrl').addEventListener('blur', e => {
  const url = e.target.value.trim();
  if (url) loadLineIds(url);
});

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  loading.style.display = 'none';
}

async function processFile(file) {
  if (!file.name.match(/\.(xlsx|xls)$/i)) {
    showError('Excelファイル（.xlsx / .xls）を選択してください');
    return;
  }
  errorMsg.style.display = 'none';
  loading.style.display = 'block';
  results.style.display = 'none';

  try {
    const data = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(new Uint8Array(e.target.result));
      reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
      reader.readAsArrayBuffer(file);
    });

    const workbook = XLSX.read(data, { type: 'array' });
    const sheetName = workbook.SheetNames.find(n => n.includes('特訓')) || workbook.SheetNames[0];
    if (!sheetName) throw new Error('シートが見つかりません');

    const ws = workbook.Sheets[sheetName];
    const jsonData = XLSX.utils.sheet_to_json(ws, { range: 9, header: 1, defval: '' });

    if (jsonData.length < 2) throw new Error('データが見つかりません');

    const dataRows = jsonData.slice(1);

    const properData = dataRows
      .filter(row => {
        const name = (row[4] || '').toString().trim();
        return name !== '' && /[　-鿿゠-ヿ぀-ゟ]/.test(name);
      })
      .map(row => {
        const tokkunName = (row[3] || '').toString().trim();
        return {
          'lineUserId': '',
          '生徒氏名': (row[4] || '').toString().trim(),
          '開始時間':  (row[5] || '').toString().trim(),
          '終了時間':  (row[6] || '').toString().trim(),
          '担当':      (row[7] || '').toString().trim(),
          '特訓名':    tokkunName,
          'コース名':  tokkunName,
          '科目': (() => {
            const m1 = tokkunName.match(/[（(]([^）)]+)[）)]/);
            if (m1) return m1[1];
            const m2 = tokkunName.match(/:([^:]+)$/);
            if (m2 && !m2[1].includes('指導枠') && !m2[1].includes('枠')) return m2[1].trim();
            return '';
          })(),
        };
      });

    students = properData.filter(s => s['生徒氏名'] !== '');
    if (students.length === 0) throw new Error('生徒データが見つかりません');

    statusMap = {};
    students.forEach((_, i) => statusMap[i] = 'pending');

    const gasUrl = document.getElementById('gasUrl').value.trim();
    if (Object.keys(lineIdCache).length > 0) {
      applyLineIds();
    } else if (gasUrl) {
      await loadLineIds(gasUrl);
      applyLineIds();
    }

    renderStudents();
    loading.style.display = 'none';
    results.style.display = 'block';

  } catch (err) {
    showError('エラー: ' + err.message);
  }
}

function formatTime(val) {
  if (!val) return '';
  const str = val.toString();
  const match = str.match(/(\d{1,2}:\d{2})/);
  return match ? match[1] : str;
}

function getOffsetHours(student) {
  const courseName = student['コース名'] || '';
  if (/体験特訓/.test(courseName)) return 0;
  if (/独学支援特訓|宿題確認特訓/.test(courseName)) return 0;
  if (/個別管理特訓L/.test(courseName)) return 2;
  if (/個別管理特訓S/.test(courseName)) return 1;
  if (/完全指導特訓L/.test(courseName)) return 1;
  if (/完全指導特訓S/.test(courseName)) return 0;
  return 0;
}

function shiftTime(val, offsetHours) {
  if (!val || offsetHours === 0) return formatTime(val);
  const str = val.toString();
  const match = str.match(/(\d{1,2}):(\d{2})/);
  if (!match) return formatTime(val);
  const totalMin = parseInt(match[1]) * 60 + parseInt(match[2]) - offsetHours * 60;
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}

function getTemplate(student) {
  const offset = getOffsetHours(student);
  const start = shiftTime(student['開始時間'], offset);
  const end = formatTime(student['終了時間']);
  const subject = student['科目'] || '';
  const teacher = student['担当'] || '';
  const courseName = student['コース名'] || '';
  const courseMatch = courseName.match(/(個別管理特訓[LS]|完全指導特訓[LS]|独学支援特訓[LS]?|宿題確認特訓[LS]?|体験特訓)/);
  const tokkunType = courseMatch ? courseMatch[1] : (student['特訓名'] || '');
  return `明日の特訓の詳細です。\nコース・教科：${tokkunType}\u3000${subject}\n${start}‐${end}\n担当：${teacher}\nお待ちしております。\nこの通知に返信不要です。`;
}

function renderStudents() {
  studentList.innerHTML = '';
  students.forEach((student, i) => {
    const name = student['生徒氏名'];
    const userId = student['lineUserId'] ? student['lineUserId'].toString().trim() : '';
    const hasId = userId !== '';
    const status = statusMap[i];
    const template = getTemplate(student);
    const fullMessage = name + 'さん\n' + template;

    const card = document.createElement('div');
    card.className = `student-card${status === 'sent' ? ' status-sent' : status === 'failed' ? ' status-failed' : status === 'manual' ? ' status-manual' : ''}`;
    card.id = `card_${i}`;

    const statusLabel = {
      pending: '⏳ 未送信', sending: '📤 送信中...', sent: '✅ 送信済み', failed: '❌ 失敗', manual: '✉️ 手動送信済み'
    }[status];
    const statusClass = status === 'manual' ? 'manual-done' : status;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-left">
          <span class="student-num">${i + 1}</span>
          <span class="student-name">${escHtml(name)}</span>
          ${hasId
            ? `<span class="id-badge">${escHtml(userId.substring(0, 12))}...</span>`
            : `<span class="no-id-badge">LINE IDなし</span>`
          }
        </div>
        <div class="card-actions">
          <span class="status-badge ${statusClass}" id="badge_${i}">${statusLabel}</span>
          ${hasId ? `<button class="btn btn-send" id="sendBtn_${i}" onclick="sendOne(${i})" ${status === 'sent' || status === 'sending' ? 'disabled' : ''}>📤 送信</button>` : ''}
          <button class="btn btn-copy" onclick="copyTemplate(${i})">📋 コピー</button>
          <label class="manual-check">
            <input type="checkbox" id="manualCheck_${i}" onchange="setManual(${i}, this.checked)" ${status === 'manual' || status === 'sent' ? 'checked' : ''} ${status === 'sent' ? 'disabled' : ''}>
            送信済み
          </label>
          <button class="toggle-preview" onclick="togglePreview(${i})">▾ 本文</button>
        </div>
      </div>
      <div class="error-detail-bar" id="errorBar_${i}" style="display:none">
        <span class="error-icon">⚠️</span>
        <span class="error-text" id="errorText_${i}"></span>
      </div>
      <div class="template-preview" id="preview_${i}" style="display:none">
        <textarea class="template-textarea" id="textarea_${i}" oninput="updateMessage(${i}, this.value)">${escHtml(fullMessage)}</textarea>
        <div class="edit-hint">✏️ クリックして本文を編集できます</div>
      </div>
    `;
    studentList.appendChild(card);
  });

  updateStats();
}

function togglePreview(i) {
  const el = document.getElementById(`preview_${i}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function copyTemplate(i) {
  const ta = document.getElementById(`textarea_${i}`);
  const text = ta ? ta.value : (students[i]['生徒氏名'] + 'さん\n' + getTemplate(students[i]));
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }
  const btn = event.target;
  btn.textContent = '✅ コピー済み';
  setTimeout(() => btn.textContent = '📋 コピー', 2000);
}

function updateMessage(i, value) {
  students[i]._customMessage = value;
}

function setManual(i, checked) {
  statusMap[i] = checked ? 'manual' : 'pending';
  students[i]._errorMsg = '';
  updateCard(i);
  updateStats();
}

async function sendOne(i) {
  const gasUrl = document.getElementById('gasUrl').value.trim();
  if (!gasUrl) { alert('GAS URLを入力してください'); return; }

  const student = students[i];
  const userId = student['lineUserId'].toString().trim();
  const ta = document.getElementById(`textarea_${i}`);
  const message = ta ? ta.value : (student['生徒氏名'] + 'さん\n' + getTemplate(student));

  setStatus(i, 'sending', '');

  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      body: JSON.stringify({ students: [{ lineUserId: userId, name: student['生徒氏名'], message }] })
    });
    const json = await res.json();
    const result = json.results && json.results[0];
    if (result && result.status === 'sent') {
      setStatus(i, 'sent', '');
    } else {
      const errMsg = friendlyError(result?.code, result?.error);
      setStatus(i, 'failed', errMsg);
    }
  } catch(e) {
    setStatus(i, 'failed', 'ネットワークエラー: ' + e.message);
  }
}

function sendAll() {
  const gasUrl = document.getElementById('gasUrl').value.trim();
  if (!gasUrl) { alert('GAS URLを入力してください'); return; }

  const targets = students
    .map((s, i) => ({ s, i }))
    .filter(({ i }) => {
      const uid = students[i]['lineUserId']?.toString().trim();
      return uid && statusMap[i] !== 'sent';
    });

  const noIdStudents = students
    .map((s, i) => ({ s, i }))
    .filter(({ i }) => {
      const uid = students[i]['lineUserId']?.toString().trim();
      return !uid && statusMap[i] !== 'manual';
    });

  if (targets.length === 0 && noIdStudents.length === 0) {
    alert('送信対象の生徒がいません');
    return;
  }

  const modalBody = document.getElementById('modalBody');
  modalBody.innerHTML = '';

  if (targets.length > 0) {
    const sendHeader = document.createElement('div');
    sendHeader.style.cssText = 'font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;margin-top:4px;';
    sendHeader.textContent = '✅ 送信対象';
    modalBody.appendChild(sendHeader);

    targets.forEach(({ s, i }) => {
      const name = s['生徒氏名'];
      const ta = document.getElementById(`textarea_${i}`);
      const message = ta ? ta.value : (name + 'さん\n' + getTemplate(s));
      const row = document.createElement('div');
      row.className = 'preview-row';
      row.innerHTML = `
        <div class="preview-row-header">
          <span>${i + 1}.</span>
          <span>${escHtml(name)}</span>
        </div>
        <div class="preview-row-body">${escHtml(message)}</div>
      `;
      modalBody.appendChild(row);
    });
  }

  if (noIdStudents.length > 0) {
    const noIdHeader = document.createElement('div');
    noIdHeader.style.cssText = 'font-size:12px;color:var(--warning);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;margin-top:16px;';
    noIdHeader.textContent = '⚠️ LINE IDなし（送信できません）';
    modalBody.appendChild(noIdHeader);

    noIdStudents.forEach(({ s, i }) => {
      const name = s['生徒氏名'];
      const row = document.createElement('div');
      row.style.cssText = 'border:1px solid rgba(251,191,36,0.3);border-radius:10px;margin-bottom:8px;overflow:hidden;';
      row.innerHTML = `
        <div style="padding:10px 14px;background:rgba(251,191,36,0.08);display:flex;align-items:center;gap:8px;font-size:14px;">
          <span style="color:var(--text-muted)">${i + 1}.</span>
          <span>${escHtml(name)}</span>
          <span style="font-size:11px;color:var(--warning);background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.3);border-radius:4px;padding:2px 6px;margin-left:auto;">LINE IDなし</span>
        </div>
      `;
      modalBody.appendChild(row);
    });
  }

  document.getElementById('modalCount').textContent = targets.length;
  document.getElementById('noIdCount').textContent = noIdStudents.length > 0
    ? `（LINE IDなし：${noIdStudents.length}名は送信されません）`
    : '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function confirmSendAll() {
  const gasUrl = document.getElementById('gasUrl').value.trim();
  closeModal();

  document.getElementById('sendAllBtn').disabled = true;

  const targets = students
    .map((s, i) => ({ s, i }))
    .filter(({ i }) => {
      const uid = students[i]['lineUserId']?.toString().trim();
      return uid && statusMap[i] !== 'sent';
    });

  for (const { s, i } of targets) {
    const userId = s['lineUserId'].toString().trim();
    const ta2 = document.getElementById(`textarea_${i}`);
    const message = ta2 ? ta2.value : (s['生徒氏名'] + 'さん\n' + getTemplate(s));
    setStatus(i, 'sending', '');

    try {
      const res = await fetch(gasUrl, {
        method: 'POST',
        body: JSON.stringify({ students: [{ lineUserId: userId, name: s['生徒氏名'], message }] })
      });
      const json = await res.json();
      const result = json.results && json.results[0];
      if (result && result.status === 'sent') {
        setStatus(i, 'sent', '');
      } else {
        const errMsg = friendlyError(result?.code, result?.error);
        setStatus(i, 'failed', errMsg);
      }
    } catch(e) {
      setStatus(i, 'failed', 'ネットワークエラー: ' + e.message);
    }

    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('sendAllBtn').disabled = false;
}

function setStatus(i, status, errMsg) {
  statusMap[i] = status;
  students[i]._errorMsg = errMsg || '';
  updateCard(i);
  updateStats();
}

function updateCard(i) {
  const status = statusMap[i];
  const errMsg = students[i]._errorMsg || '';
  const card = document.getElementById(`card_${i}`);
  const badge = document.getElementById(`badge_${i}`);
  const sendBtn = document.getElementById(`sendBtn_${i}`);
  const errorBar = document.getElementById(`errorBar_${i}`);
  const errorText = document.getElementById(`errorText_${i}`);

  card.className = `student-card${status === 'sent' ? ' status-sent' : status === 'failed' ? ' status-failed' : status === 'manual' ? ' status-manual' : ''}`;

  const labels = { pending: '⏳ 未送信', sending: '📤 送信中...', sent: '✅ 送信済み', failed: '❌ 失敗', manual: '✉️ 手動送信済み' };
  const classes = { pending: 'pending', sending: 'sending', sent: 'sent', failed: 'failed', manual: 'manual-done' };

  badge.textContent = labels[status];
  badge.className = `status-badge ${classes[status]}`;

  // エラーバー表示
  if (status === 'failed' && errMsg) {
    errorText.textContent = errMsg;
    errorBar.style.display = 'flex';
  } else {
    errorBar.style.display = 'none';
    errorText.textContent = '';
  }

  if (sendBtn) sendBtn.disabled = status === 'sent' || status === 'sending';
  const cb = document.getElementById(`manualCheck_${i}`);
  if (cb) { cb.checked = status === 'sent' || status === 'manual'; cb.disabled = status === 'sent'; }
}

function updateStats() {
  const counts = { sent: 0, manual: 0, failed: 0, pending: 0, sending: 0 };
  Object.values(statusMap).forEach(s => counts[s] = (counts[s] || 0) + 1);

  document.getElementById('totalCount').textContent = students.length;
  document.getElementById('sentCount').textContent = counts.sent || 0;
  document.getElementById('manualCount').textContent = counts.manual || 0;
  document.getElementById('failedCount').textContent = counts.failed || 0;
  document.getElementById('pendingCount').textContent = (counts.pending || 0) + (counts.sending || 0);
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
